version: '3.8'

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Jafeth123!"
    ports:
      - "14330:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./db:/scripts

  sql-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: sql-init
    depends_on:
      - db
    volumes:
      - ./db:/scripts
    entrypoint: >
      /bin/bash -c "
      sleep 30 &&
      /opt/mssql-tools/bin/sqlcmd -S db -U sa -P Jafeth123! -i /scripts/init.sql
      "

  barber-360:
    build: ./Barber_360
    container_name: barber-api
    ports:
      - "5000:8080"
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=Barberia360;User Id=sa;Password=Jafeth123!;TrustServerCertificate=True;
      - JWT_KEY=SUPER_SECRET_KEY_123

  api-node:
    build: ./api-node
    container_name: node-api
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=Barberia360
      - DB_USER=sa
      - DB_PASSWORD=Jafeth123!

volumes:
  sql_data:
